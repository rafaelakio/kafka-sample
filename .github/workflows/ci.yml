name: CI
on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: Build & test
        run: mvn -B -ntp verify
      - name: Upload jacoco
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco
          path: target/site/jacoco
